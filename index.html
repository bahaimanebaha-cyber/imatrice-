<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMatrice Platinum - Mobile Ready</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
    <style>
        :root {
            --primary: #4338ca; --dark: #0f172a; --bg: #f1f5f9; 
            --border: #e2e8f0; --success: #059669;
        }
        
        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar adaptative */
        .sidebar {
            width: 300px;
            background: var(--dark);
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        /* Toggle Menu Mobile */
        .menu-btn {
            display: none;
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1100;
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-weight: bold;
        }

        .nav-btn {
            background: #1e293b; color: #cbd5e1; border: 1px solid #334155;
            padding: 12px; margin-bottom: 8px; cursor: pointer;
            border-radius: 8px; text-align: left; font-size: 0.9rem;
        }

        .panel-title {
            font-size: 0.7rem; text-transform: uppercase; color: #94a3b8;
            margin: 15px 0 8px; font-weight: 800; letter-spacing: 1px;
        }

        #rappels-box {
            background: #1e293b; padding: 10px; border-radius: 8px;
            font-size: 0.8rem; border-left: 4px solid var(--primary); margin-bottom: 15px;
        }

        #brouillon {
            width: 100%; height: 80px; background: #fffbeb; border-radius: 8px;
            padding: 8px; font-size: 0.8rem; border: 1px dashed #f59e0b; resize: none;
        }

        /* Zone de jeu */
        .viewport {
            flex: 1; display: flex; flex-direction: column; background: white;
            margin: 10px; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header {
            padding: 10px 15px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }

        #chat-flow {
            flex: 1; padding: 15px; overflow-y: auto; background: #f8fafc;
            display: flex; flex-direction: column; gap: 12px;
        }

        .bubble {
            max-width: 85%; padding: 12px; border-radius: 12px; font-size: 0.95rem;
            line-height: 1.4; animation: fadeIn 0.3s ease;
        }

        .bot { background: white; border: 1px solid var(--border); align-self: flex-start; }
        .user { background: var(--primary); color: white; align-self: flex-end; }

        .math-display {
            background: #f1f5f9; padding: 15px; border-radius: 8px;
            margin: 8px 0; overflow-x: auto; text-align: center;
        }

        .input-bar { padding: 10px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
        
        #ui {
            flex: 1; padding: 12px; border: 2px solid var(--border);
            border-radius: 8px; font-size: 16px; /* Empêche le zoom iOS */
        }

        .lvl-btn {
            background: #e2e8f0; border: none; padding: 6px 12px;
            border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.8rem;
        }

        /* MEDIA QUERIES MOBILE */
        @media (max-width: 768px) {
            .menu-btn { display: block; }
            .sidebar {
                position: fixed; left: 0; top: 0; bottom: 0;
                transform: translateX(-100%); width: 260px;
            }
            .sidebar.open { transform: translateX(0); }
            .viewport { margin: 0; border-radius: 0; padding-top: 50px; }
            header { flex-direction: column; gap: 8px; text-align: center; }
            #lvl-picker { flex-wrap: wrap; justify-content: center; }
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <button class="menu-btn" onclick="toggleMenu()">☰ Menu</button>

    <aside class="sidebar" id="sidebar">
        <h2 style="font-size: 1.2rem; color: #fff;">iMatrice <span style="color:#818cf8">Platinum</span></h2>
        <div id="infoUser" style="font-size:0.75rem; color:#94a3b8; margin-bottom:15px; border-bottom:1px solid #334155; padding-bottom:10px;"></div>
        
        <div class="panel-title">Modules</div>
        <button class="nav-btn" onclick="setModule('suites', '🔢 Suites')">🔢 Suites Numériques</button>
        <button class="nav-btn" onclick="setModule('limites', '📉 Limites')">📉 Limites</button>
        <button class="nav-btn" onclick="setModule('derivation', '✍️ Dérivation')">✍️ Dérivation</button>
        <button class="nav-btn" onclick="setModule('fonctions', '📊 Fonctions')">📊 Étude de Fonctions</button>
        
        <div class="panel-title">Indice</div>
        <div id="rappels-box">Prêt pour l'entraînement.</div>

        <div class="panel-title">Brouillon</div>
        <textarea id="brouillon" placeholder="Tes notes..."></textarea>

        <button class="nav-btn" style="background:var(--success); color:white; margin-top:20px; text-align:center;" onclick="sendReportManual()">📊 Envoyer Score</button>
    </aside>

    <main class="viewport">
        <header>
            <div id="current-mod" style="font-weight:bold; font-size: 0.9rem;">Choisissez un module</div>
            <div id="lvl-picker" style="display:none; gap:5px;">
                <button class="lvl-btn" onclick="startLevel(1)">Niv 1</button>
                <button class="lvl-btn" onclick="startLevel(2)">Niv 2</button>
                <button class="lvl-btn" onclick="startLevel(3)">Niv 3</button>
            </div>
            <div style="font-size:0.8rem; font-weight:bold; background:#eef2ff; padding:5px 10px; border-radius:15px;">
                XP: <span id="xp" style="color:var(--primary)">0</span>
            </div>
        </header>

        <div id="chat-flow"></div>

        <div class="input-bar">
            <input type="text" id="ui" placeholder="Réponse ici..." autocomplete="off">
        </div>
    </main>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwmbUOQjUPMW-kEkyi_B35WM9tF-ihE7o1630sTBe2wR0imY7Nfky8SzYJ1jw7Xl_7uPA/exec";
        
        let identity = { nom: "", prenom: "", classe: "" };
        let score = 0, currentModKey = '', currentQ = null, queue = [];

        const exoData = {
            suites: [
                {lvl:1,q:"\\text{Soit } (U_n) \\text{ arithmétique avec } U_0=2, r=3. \\text{ Calculer } U_5.",sol:"17",rule:"U_n = U_0 + n×r"},
                {lvl:1,q:"\\text{Soit } U_0=1, r=4. \\text{ Calculer } U_3.",sol:"13",rule:"Ajouter la raison r"},
                {lvl:1,q:"\\text{Soit } U_0=3, q=2. \\text{ Calculer } U_3.",sol:"24",rule:"U_n = U_0 × q^n"},
                {lvl:1,q:"\\text{Suite géom. } U_0=2, q=3. \\text{ Calculer } U_2.",sol:"18",rule:"Multiplier par q"},
                {lvl:1,q:"\\text{Suite arith. } U_0=5, r=2. \\text{ Calculer } U_4.",sol:"13",rule:"U_n=U_0+n×r"},
                {lvl:1,q:"\\text{Suite arith. } U_0=0, r=5. \\text{ Calculer } U_2.",sol:"10",rule:"Formule de base"},
                {lvl:1,q:"\\text{Suite géom. } U_0=4, q=2. \\text{ Calculer } U_2.",sol:"16",rule:"U_n = U_0 * q^n"},
                {lvl:1,q:"\\text{Suite arith. } U_0=6, r=1. \\text{ Calculer } U_3.",sol:"9",rule:"Addition de r"},
                {lvl:1,q:"\\text{Suite géom. } U_0=1, q=5. \\text{ Calculer } U_2.",sol:"25",rule:"Progression géométrique"},
                {lvl:1,q:"\\text{Suite arith. } U_0=3, r=4. \\text{ Calculer } U_2.",sol:"11",rule:"U_n = U_0 + n*r"},
                {lvl:2,q:"U_{n+1}=U_n+3. \\text{ Nature ?}",sol:"arithmetique",rule:"Forme U_{n+1}=U_n+r"},
                {lvl:2,q:"U_{n+1}=2U_n. \\text{ Nature ?}",sol:"geometrique",rule:"Forme U_{n+1}=qU_n"},
                {lvl:2,q:"U_{n+1}=U_n-5. \\text{ Nature ?}",sol:"arithmetique",rule:"La raison est négative"},
                {lvl:2,q:"U_{n+1}=3U_n. \\text{ Nature ?}",sol:"geometrique",rule:"Raison q=3"},
                {lvl:2,q:"U_{n+1}=U_n+1. \\text{ Nature ?}",sol:"arithmetique",rule:"Saut constant de +1"},
                {lvl:2,q:"U_{n+1}=4U_n. \\text{ Nature ?}",sol:"geometrique",rule:"Multiplication par 4"},
                {lvl:2,q:"U_{n+1}=U_n-2. \\text{ Nature ?}",sol:"arithmetique",rule:"r = -2"},
                {lvl:2,q:"U_{n+1}=5U_n. \\text{ Nature ?}",sol:"geometrique",rule:"q = 5"},
                {lvl:2,q:"U_{n+1}=U_n+7. \\text{ Nature ?}",sol:"arithmetique",rule:"Arithmétique r=7"},
                {lvl:2,q:"U_{n+1}=10U_n. \\text{ Nature ?}",sol:"geometrique",rule:"Géométrique q=10"},
                {lvl:3,q:"\\text{Arith. } U_0=2, r=3. \\text{ Exprimer } U_n.",sol:"2+3n",rule:"Forme explicite"},
                {lvl:3,q:"\\text{Géom. } U_0=2, q=3. \\text{ Donner } U_n.",sol:"2*3^n",rule:"Forme q^n"},
                {lvl:3,q:"U_{n+1}=U_n+4, U_0=1. \\text{ Donner } U_n.",sol:"1+4n",rule:"Explicite"},
                {lvl:3,q:"U_{n+1}=2U_n, U_0=1. \\text{ Donner } U_n.",sol:"2^n",rule:"U_n = U_0 * q^n"},
                {lvl:3,q:"U_{n+1}=3U_n, U_0=2. \\text{ Donner } U_n.",sol:"2*3^n",rule:"Formule géométrique"},
                {lvl:3,q:"U_{n+1}=5U_n, U_0=0. \\text{ Donner } U_n.",sol:"5n",rule:"Cas U_0=0"},
                {lvl:3,q:"U_{n+1}=4U_n, U_0=3. \\text{ Donner } U_n.",sol:"3*4^n",rule:"Formule q^n"},
                {lvl:3,q:"U_{n+1}=U_n-2, U_0=6. \\text{ Donner } U_n.",sol:"6-2n",rule:"Raison négative"},
                {lvl:3,q:"U_{n+1}=5U_n, U_0=1. \\text{ Donner } U_n.",sol:"5^n",rule:"Puissance de 5"},
                {lvl:3,q:"U_{n+1}=U_n+3, U_0=2. \\text{ Donner } U_n.",sol:"2+3n",rule:"Formule arithmétique"}
            ],
            limites: [
                {lvl:1,q:"\\lim_{x \\to +\\infty} x^2.",sol:"+inf",rule:"x² tend vers l'infini"},
                {lvl:1,q:"\\lim_{x \\to -\\infty} x^2.",sol:"+inf",rule:"Carré positif"},
                {lvl:1,q:"\\lim_{x \\to +\\infty} -x^3.",sol:"-inf",rule:"Signe moins"},
                {lvl:1,q:"\\lim_{x \\to 2} (x^2-4).",sol:"0",rule:"Calcul direct"},
                {lvl:1,q:"\\lim_{x \\to 1} (x+2).",sol:"3",rule:"Substitution"},
                {lvl:1,q:"\\lim_{x \\to 0} 1/x.",sol:"inf",rule:"Division par zéro"},
                {lvl:2,q:"\\lim_{x \\to +\\infty} \\frac{2x}{x+1}.",sol:"2",rule:"Plus haut degré"},
                {lvl:2,q:"\\lim_{x \\to +\\infty} \\frac{x}{x^2+1}.",sol:"0",rule:"Dénominateur fort"},
                {lvl:3,q:"\\lim_{x \\to +\\infty} (\\sqrt{x^2+1}-x).",sol:"0",rule:"Quantité conjuguée"}
            ],
            derivation: [
                {lvl:1,q:"f(x)=3x^2. f'(x)=?",sol:"6x",rule:"(x^n)' = n*x^{n-1}"},
                {lvl:2,q:"f(x)=2x^2+3x+1. f'(x)=?",sol:"4x+3",rule:"Somme"},
                {lvl:3,q:"f(x)=\\frac{x}{x+1}. f'(x)=?",sol:"1/(x+1)^2",rule:"Quotient"}
            ],
            fonctions: [
                {lvl:1,q:"f(x)=\\frac{1}{x-1}. \\text{ Asymptote en } 1 ?",sol:"verticale",rule:"Dénominateur nul"},
                {lvl:2,q:"\\text{Direction de } f(x)=x^2 \\text{ en } +\\infty.",sol:"axe des ordonnees",rule:"Parabole"},
                {lvl:3,q:"f''(x)=2>0. \\text{ Nature ?}",sol:"convexe",rule:"f''(x) > 0"}
            ]
        };

        window.onload = () => {
            identity.nom = prompt("Ton Nom :") || "Nom";
            identity.prenom = prompt("Ton Prénom :") || "Eleve";
            identity.classe = prompt("Ta Classe :") || "1Bac";
            document.getElementById('infoUser').innerText = `👤 ${identity.prenom} ${identity.nom} | ${identity.classe}`;
            addMsg("bot", `Bonjour ${identity.prenom} ! Ouvre le menu pour commencer.`);
        };

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function setModule(key, name) {
            currentModKey = key;
            document.getElementById('current-mod').innerText = name;
            document.getElementById('lvl-picker').style.display = 'flex';
            addMsg("bot", `Module ${name} sélectionné. Choisis ton niveau.`);
            if(window.innerWidth <= 768) toggleMenu();
        }

        function startLevel(l) {
            queue = [...exoData[currentModKey].filter(x => x.lvl === l)];
            queue.sort(() => Math.random() - 0.5);
            addMsg("bot", `🚀 C'est parti pour le Niveau ${l} !`);
            next();
        }

        function next() {
            if (queue.length === 0) {
                addMsg("bot", "Série terminée ! Score synchronisé.");
                sendReport();
                return;
            }
            currentQ = queue.shift();
            const mid = "m" + Date.now();
            addMsg("bot", `Question : <div class="math-display" id="${mid}"></div>`);
            katex.render(currentQ.q, document.getElementById(mid), { displayMode: true, throwOnError: false });
            document.getElementById('rappels-box').innerText = currentQ.rule;
        }

        document.getElementById('ui').addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                let ans = e.target.value.trim().toLowerCase();
                if (!ans) return;
                addMsg("user", ans);
                
                const cleanUser = ans.replace(/\s/g,"");
                const cleanSol = currentQ.sol.toLowerCase().replace(/\s/g,"");

                if (cleanUser === cleanSol) {
                    score += 10;
                    document.getElementById('xp').innerText = score;
                    addMsg("bot", "✅ **Bravo !**");
                } else {
                    addMsg("bot", `❌ Non, la réponse était : **${currentQ.sol}**`);
                }
                e.target.value = "";
                setTimeout(next, 1200);
            }
        });

        function addMsg(type, text) {
            const flow = document.getElementById('chat-flow');
            const d = document.createElement('div');
            d.className = "bubble " + type;
            d.innerHTML = text;
            flow.appendChild(d);
            flow.scrollTop = flow.scrollHeight;
        }

        function sendReport() {
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ ...identity, score: score, module: currentModKey })
            }).then(() => addMsg("bot", "📊 Score enregistré."));
        }

        function sendReportManual() {
            sendReport();
            alert("Rapport envoyé à Mme Imane BAHA !");
            if(window.innerWidth <= 768) toggleMenu();
        }
    </script>
</body>
</html>
