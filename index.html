<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMatrice Platinum - Espace d'Entraînement</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
    <style>
        :root {
            --primary: #4338ca; 
            --dark: #0f172a; 
            --bg: #f1f5f9; 
            --border: #e2e8f0;
            --success: #059669; 
            --danger: #dc2626; 
        }
        body {
            background: var(--bg); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex;
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        
        /* Sidebar Styles */
        .sidebar {
            width: 320px; 
            background: var(--dark); 
            color: white; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        }
        .nav-btn {
            background: #1e293b; 
            color: #cbd5e1; 
            border: 1px solid #334155; 
            padding: 12px;
            margin-bottom: 8px; 
            cursor: pointer; 
            border-radius: 8px; 
            text-align: left;
            font-size: 0.9rem; 
            transition: all 0.2s; 
        }
        .nav-btn:hover { background: var(--primary); color: white; transform: translateX(5px); }
        
        .panel-title {
            font-size: 0.7rem; 
            text-transform: uppercase; 
            color: #94a3b8; 
            margin: 20px 0 10px; 
            font-weight: 800; 
            letter-spacing: 1.2px; 
        }
        #rappels-box {
            background: #1e293b; 
            padding: 12px; 
            border-radius: 8px; 
            font-size: 0.85rem;
            border-left: 4px solid var(--primary); 
            color: #e2e8f0; 
            margin-bottom: 15px;
            line-height: 1.4;
        }
        #brouillon {
            width: 100%; 
            height: 120px; 
            background: #fffbeb; 
            border: 1px dashed #f59e0b;
            border-radius: 8px; 
            padding: 10px; 
            font-size: 0.85rem; 
            resize: none; 
            color: #92400e; 
            box-sizing: border-box; 
            margin-bottom: 20px; 
        }
        
        .send-btn {
            background: var(--success); 
            color: white; 
            border: none; 
            padding: 14px;
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.3s; 
            text-align: center; 
            margin-top: auto; 
        }
        .send-btn:hover { background: #047857; filter: brightness(1.1); }

        /* Main Viewport */
        .viewport {
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: white; 
            margin: 15px;
            border-radius: 16px; 
            overflow: hidden; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        header {
            padding: 15px 25px; 
            border-bottom: 1px solid var(--border); 
            display: flex;
            justify-content: space-between; 
            align-items: center; 
            background: white; 
        }
        
        #chat-flow {
            flex: 1; 
            padding: 25px; 
            overflow-y: auto; 
            background: #f8fafc; 
            display: flex;
            flex-direction: column; 
            gap: 15px; 
        }
        .bubble {
            max-width: 80%; 
            padding: 14px 18px; 
            border-radius: 15px; 
            font-size: 1rem;
            line-height: 1.6; 
            position: relative;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .bot { background: white; border: 1px solid var(--border); align-self: flex-start; box-shadow: 0 2px 5px rgba(0,0,0,0.03); color: #1e293b; }
        .user { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        
        .math-display { 
            font-size: 1.2rem; 
            margin: 10px 0; 
            padding: 20px; 
            text-align: center;
            background: #f1f5f9; 
            border-radius: 10px; 
            border: 1px solid var(--border);
        }
        
        .input-bar {
            padding: 20px; 
            background: white; 
            border-top: 1px solid var(--border); 
            display: flex; 
            gap: 12px; 
        }
        #ui { 
            flex: 1;
            padding: 14px; 
            border: 2px solid var(--border); 
            border-radius: 10px; 
            font-size: 1rem; 
            outline: none; 
            transition: 0.2s;
        }
        #ui:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(67, 56, 202, 0.1); }
        
        .lvl-btn {
            background: #e2e8f0; 
            border: none; 
            padding: 8px 16px; 
            border-radius: 8px;
            cursor: pointer; 
            font-weight: bold; 
            font-size: 0.85rem; 
            transition: 0.2s;
        }
        .lvl-btn:hover { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h2 style="font-size: 1.4rem; margin-bottom: 5px; color: #fff;">iMatrice <span style="color:#818cf8">Platinum</span></h2>
        <div id="infoUser" style="font-size:0.85rem; color:#94a3b8; margin-bottom:20px; padding-bottom:10px; border-bottom:1px solid #334155;"></div>
        
        <div class="panel-title">Modules Mathématiques</div>
        <button class="nav-btn" onclick="setModule('suites', '🔢 Suites Numériques')">🔢 Suites Numériques</button>
        <button class="nav-btn" onclick="setModule('limites', '📉 Limites de fonctions')">📉 Limites de fonctions</button>
        <button class="nav-btn" onclick="setModule('derivation', '✍️ Dérivation')">✍️ Dérivation</button>
        <button class="nav-btn" onclick="setModule('fonctions', '📊 Étude de Fonctions')">📊 Étude de Fonctions</button>
        
        <div class="panel-title">Indice / Rappel</div>
        <div id="rappels-box">Sélectionnez un module pour commencer l'entraînement.</div>

        <div class="panel-title">Zone de Brouillon</div>
        <textarea id="brouillon" placeholder="Utilise cet espace pour tes calculs intermédiaires..."></textarea>

        <button class="send-btn" onclick="sendReportManual()">📊 Synchroniser mon Score</button>
    </aside>

    <main class="viewport">
        <header>
            <div id="current-mod" style="font-weight:bold; font-size: 1.1rem; color: var(--dark);">Prêt pour l'entraînement ?</div>
            <div id="lvl-picker" style="display:none; gap:10px;">
                <button class="lvl-btn" onclick="startLevel(1)">Niveau 1</button>
                <button class="lvl-btn" onclick="startLevel(2)">Niveau 2</button>
                <button class="lvl-btn" onclick="startLevel(3)">Niveau 3</button>
            </div>
            <div style="font-weight:bold; background: #eef2ff; padding: 8px 15px; border-radius: 20px;">Score: <span id="xp" style="color:var(--primary)">0</span> XP</div>
        </header>

        <div id="chat-flow"></div>

        <div class="input-bar">
            <input type="text" id="ui" placeholder="Saisis ta réponse ici..." autocomplete="off">
        </div>
    </main>

    <script>

                {lvl:3,q:"\\text{Si } f''(x)=2>0. \\text{ Nature de la courbe ?}",sol:"convexe",rule:"f''(x) > 0"},
                {lvl:3,q:"\\text{Si } f''(x)=-3<0. \\text{ Nature ?}",sol:"concave",rule:"f''(x) < 0"},
                {lvl:3,q:"\\text{Si } f''(x)=6x. \\text{ Point d'inflexion ?}",sol:"0",rule:"Signe f'' change"},
                {lvl:3,q:"\\text{Si } f''(x)=x-2. \\text{ Point d'inflexion ?}",sol:"2",rule:"= 0"},
                {lvl:3,q:"\\text{Si } f''(x)=x. \\text{ Signe pour } x>0 ?",sol:"positif",rule:"Direct"},
                {lvl:3,q:"\\text{Si } f''(x)=-x. \\text{ Signe pour } x>0 ?",sol:"negatif",rule:"-x"},
                {lvl:3,q:"\\text{Si } f''(x)=4>0. \\text{ Nature ?}",sol:"convexe",rule:"Positif"},
                {lvl:3,q:"\\text{Si } f''(x)=-5<0. \\text{ Nature ?}",sol:"concave",rule:"Négatif"},
                {lvl:3,q:"\\text{Si } f''(x)=2x. \\text{ Point d'inflexion ?}",sol:"0",rule:"Zéro"},
                {lvl:3,q:"\\text{Si } f''(x)=x+1. \\text{ Point d'inflexion ?}",sol:"-1",rule:"Zero"}
            ]
        };

        window.onload = () => {
            identity.nom = prompt("Ton Nom :") || "Nom_Inconnu";
            identity.prenom = prompt("Ton Prénom :") || "Eleve";
            identity.classe = prompt("Ta Classe :") || "1Bac";
            document.getElementById('infoUser').innerText = `👤 ${identity.prenom} ${identity.nom} | 🏫 ${identity.classe}`;
            addMsg("bot", `Bonjour ${identity.prenom} ! Je suis ton tuteur iMatrice. Choisis un module et un niveau pour commencer l'entraînement.`);
        };

        function setModule(key, name) {
            currentModKey = key;
            document.getElementById('current-mod').innerText = name;
            document.getElementById('lvl-picker').style.display = 'flex';
            addMsg("bot", `Tu as sélectionné : **${name}**. Choisis maintenant ton niveau de difficulté.`);
        }

        function startLevel(l) {
            queue = [...exoData[currentModKey].filter(x => x.lvl === l)];
            // Mélanger les questions
            queue.sort(() => Math.random() - 0.5);
            addMsg("bot", `🚀 C'est parti pour le **Niveau ${l}** ! Résous les questions les unes après les autres.`);
            next();
        }

        function next() {
            if (queue.length === 0) {
                addMsg("bot", "Bravo ! Tu as terminé cette série. Ton score est en cours de sauvegarde.");
                sendReport();
                return;
            }
            currentQ = queue.shift();
            const mid = "m" + Date.now();
            addMsg("bot", `Question : <div class="math-display" id="${mid}"></div>`);
            katex.render(currentQ.q, document.getElementById(mid), { displayMode: true, throwOnError: false });
            document.getElementById('rappels-box').innerText = currentQ.rule;
        }

        document.getElementById('ui').addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                let ans = e.target.value.trim().toLowerCase();
                if (!ans) return;
                addMsg("user", ans);
                
                // Nettoyage basique pour comparaison
                const cleanUser = ans.replace(/\s/g,"");
                const cleanSol = currentQ.sol.toLowerCase().replace(/\s/g,"");

                if (cleanUser === cleanSol) {
                    score += 10;
                    document.getElementById('xp').innerText = score;
                    addMsg("bot", "✅ **Excellent !** C'est la bonne réponse.");
                } else {
                    addMsg("bot", `❌ **Dommage.** La réponse attendue était : **${currentQ.sol}**`);
                }
                e.target.value = "";
                setTimeout(next, 1000);
            }
        });

        function addMsg(type, text) {
            const flow = document.getElementById('chat-flow');
            const d = document.createElement('div');
            d.className = "bubble " + type;
            d.innerHTML = text;
            flow.appendChild(d);
            flow.scrollTop = flow.scrollHeight;
        }

        function sendReport() {
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ...identity, score: score, module: currentModKey })
            }).then(() => {
                addMsg("bot", "📊 **Score synchronisé avec succès sur Google Sheets.**");
            }).catch(e => {
                console.error(e);
                addMsg("bot", "⚠️ Erreur lors de la synchronisation. Vérifie ta connexion.");
            });
        }

        function sendReportManual() {
            sendReport();
            alert("votre rapport est envoyé à votre enseignante Imane BAHA !");
        }
    </script>
</body>
